# Single source of truth for all paths + thresholds. All paths are project-root-relative.
paths:
  raw: data/raw
  clean: data/clean
  dataset: data/v10_dataset       # v10: full restart
  outputs: outputs
  manifest: data/v10_manifest.csv # v10: written by src/v10_curate.py, consumed by stage 3 (caption) + 4 (build)
  models_dir: models
  trainer_dir: trainer

ingest:
  min_size: 1024                 # v5: drop sub-1024 at ingest (training res; no wasted captions)
  blur_var_threshold: 100.0      # v5: tuned from blur_var distribution (p33≈76, classic cutoff 100) -> keeps ~1948
  phash_hamming_threshold: 8     # v5: kill social-media reposts harder
  ocr_text_area_ratio_flag: 0.10 # only used when run_ocr_flag=true
  drop_small: true               # v5: enforce the 1024 floor
  drop_blurry: true              # v5: drop blur_var < threshold (tuned 2026-06-02)
  run_ocr_flag: false

caption:                         # v7: WD14 (EVA02) tags + Gemini expanded enum vocab + booru rating + rich NL
  nsfw_model: Falconsai/nsfw_image_detection
  nsfw_label_map:                  # v7: Falconsai is the FALLBACK rating (used only when Gemini emits none)
    NORMAL: rating:general
    NSFW: rating:explicit
  nsfw_default_tag: rating:general
  block_tags: [loli, shota, toddlercon, child, baby, infant, toddler, aged_down]  # underage HARD-BLOCK (legal, non-negotiable)
  wd_model_name: EVA02_Large       # v7: bigger/more-detailed tagger (was SwinV2_v3); key for Gemini-refused NSFW
  wd_general_threshold: 0.25       # v7: lower threshold -> more tags (more detail; more noise). was 0.35
  gemini:
    model: gemini-2.5-flash-lite     # cheapest vision model w/ free tier (2.0-flash-lite deprecated 2026-06-01)
    safety_block_none: true          # BLOCK_NONE on the 4 adjustable categories; child-safety always on (Google core)
    max_output_tokens: 450           # v7: richer head-to-toe NL (was 256)
    max_retries: 4
    concurrency: 12                  # parallel Gemini calls. Free tier (~15 RPM): lower to ~4. Paid tier 1+: raise to 20-50. 429s self-throttle via backoff.
    cache_file: data/gemini_cache.json
  ram:                                   # v10: RAM++ real-photo tagger (replaces booru WD14 for captions)
    checkpoint: models/ram_plus_swin_large_14m.pth   # from HF xinyu1205/recognize-anything-plus-model
    image_size: 384
    quality_prefix: "masterpiece, best quality, score_7"   # base-native quality tokens (curated = all sharp)
  nl:                                    # v10: Gemini NL caption (ported from lenstag-ai) appended after RAM++ tags
    model: gemini-3-flash-preview        # lenstag's model; falls back if unavailable (see v10_caption_nl.py)
    concurrency: 8                       # thread pool; raise on paid tier, lower to ~4 on free (15 RPM)
    max_output_tokens: 300               # ~50-100 word paragraph
    cache_file: data/v10_nl_cache.json   # resumable: image path -> NL (never re-bill on rerun)
    block_none: true                     # BLOCK_NONE safety on the 4 adjustable cats (NSFW captioning)

dataset:
  min_resolution: 1280            # v10: floor (curate already gated; build backstop). <1280 upscales too hard at 1536
  resolutions: [1536]
  min_ar: 0.66
  max_ar: 1.5
  num_ar_buckets: 7
  num_repeats: 1
  min_blur_var: 0.0

finetune:
  base_dir: /workspace/anima
  project_name: anima_realism_ft_v10     # v10: stage 4 names dataset.toml by this
  init_from: /workspace/anima/models/anima-base-v1.0.safetensors   # v10: WARM-START FROM BASE (max concept knowledge)
  epochs: 50                             # v10: project experience; save-every, pick best
  lr: 6e-6                               # v10: gentle ("light touch", HF authors); pick-best is the concept guard
  optimizer: adamw_optimi
  warmup_steps: 100
  save_every_n_epochs: 5                 # 10 ckpts (ep5..ep50) ~42GB; fits Vast disk
  checkpoint_every_n_minutes: 999999
  steps_per_print: 100
  llm_adapter_lr: 0
  tag_dropout_percent: 0
  caption_dropout_percent: 0.10
  dit_file: anima-base-v1.0.safetensors
  vae_file: qwen_image_vae.safetensors
  qwen_file: Qwen3-0.6B-Base

models:                          # Anima training assets pulled by download_models.ps1
  hf_repo: circlestone-labs/Anima
  dit: split_files/diffusion_models/anima-base-v1.0.safetensors
  te:  split_files/text_encoders/qwen_3_06b_base.safetensors
  vae: split_files/vae/qwen_image_vae.safetensors

trainer:
  repo: https://github.com/gazingstars123/Anima-Standalone-Trainer
