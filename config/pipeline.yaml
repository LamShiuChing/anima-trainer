# Single source of truth for all paths + thresholds. All paths are project-root-relative.
paths:
  raw: data/raw
  clean: data/clean
  dataset: data/dataset
  outputs: outputs
  manifest: data/manifest.csv
  models_dir: models
  trainer_dir: trainer

ingest:
  min_size: 1024                 # v5: drop sub-1024 at ingest (training res; no wasted captions)
  blur_var_threshold: 100.0      # v5: tuned from blur_var distribution (p33≈76, classic cutoff 100) -> keeps ~1948
  phash_hamming_threshold: 8     # v5: kill social-media reposts harder
  ocr_text_area_ratio_flag: 0.10 # only used when run_ocr_flag=true
  drop_small: true               # v5: enforce the 1024 floor
  drop_blurry: true              # v5: drop blur_var < threshold (tuned 2026-06-02)
  run_ocr_flag: false

caption:                         # v5: WD14 tags + local safety + Gemini structured style/NL
  nsfw_model: Falconsai/nsfw_image_detection
  nsfw_label_map:
    NORMAL: safe
    NSFW: explicit
  nsfw_default_tag: safe
  block_tags: [loli, shota, toddlercon, child, baby, infant, toddler, aged_down]
  wd_model_name: SwinV2_v3
  wd_general_threshold: 0.35
  gemini:
    model: gemini-2.5-flash-lite     # cheapest vision model w/ free tier (2.0-flash-lite deprecated 2026-06-01)
    safety_block_none: true          # BLOCK_NONE on the 4 adjustable categories; child-safety always on (Google core)
    max_output_tokens: 256
    max_retries: 4
    concurrency: 12                  # parallel Gemini calls. Free tier (~15 RPM): lower to ~4. Paid tier 1+: raise to 20-50. 429s self-throttle via backoff.
    cache_file: data/gemini_cache.json

dataset:
  min_resolution: 1024
  # diffusion-pipe dataset.toml params:
  resolutions: [1024]             # v5: 1024 training resolution
  min_ar: 0.5                    # widest portrait bucket (1:2)
  max_ar: 2.0                    # widest landscape bucket (2:1)
  num_ar_buckets: 7
  num_repeats: 1                 # lots of data; no duplication needed
  min_blur_var: 0.0              # backstop only (stage 1 does the real blur drop); raise if needed

finetune:                        # diffusion-pipe anima.toml (FULL finetune, not LoRA)
  base_dir: /workspace/anima     # Vast working dir (RUNBOOK sets this up)
  project_name: anima_realism_ft_v5
  init_from: ""                  # v5: from BASE DiT (no warm-start)
  epochs: 20
  lr: 8.0e-6                     # authors' full-finetune rec (8e-6 or lower); low to avoid catastrophic forgetting
  optimizer: adamw_optimi        # proven default; A100-80GB has VRAM to spare (no need for 8-bit)
  warmup_steps: 100
  save_every_n_epochs: 1         # one inference-ready model export per epoch (~4-5GB each)
  checkpoint_every_n_minutes: 999999  # effectively OFF — avoid ~20GB optimizer-state dumps filling disk
  steps_per_print: 100           # deepspeed log cadence; 100 = ~1 clean status line / ~45s (default 1 = spam)
  llm_adapter_lr: 0              # freeze Qwen3 LLM adapter (domain shift; preserve text understanding)
  tag_dropout_percent: 0      # v5: hybrid tag+NL captions used verbatim (dropping comma-pieces would mangle the NL sentence)
  caption_dropout_percent: 0.10  # v5: CFG: % steps trained with empty caption (drops whole caption, safe)
  dit_file: anima-base-v1.0.safetensors
  vae_file: qwen_image_vae.safetensors
  qwen_file: Qwen3-0.6B-Base    # HF DIR (loader needs tokenizer+config, not a single .safetensors); from Qwen/Qwen3-0.6B-Base

models:                          # Anima training assets pulled by download_models.ps1
  hf_repo: circlestone-labs/Anima
  dit: split_files/diffusion_models/anima-base-v1.0.safetensors
  te:  split_files/text_encoders/qwen_3_06b_base.safetensors
  vae: split_files/vae/qwen_image_vae.safetensors

trainer:
  repo: https://github.com/gazingstars123/Anima-Standalone-Trainer
