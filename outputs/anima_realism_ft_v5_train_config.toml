# diffusion-pipe — Anima FULL finetune (realism domain shift). Generated by stage 5.
output_dir = '/workspace/anima/outputs/anima_realism_ft_v5'
dataset = '/workspace/anima/outputs/anima_realism_ft_v5_dataset_config.toml'

epochs = 20
micro_batch_size_per_gpu = 1
pipeline_stages = 1
gradient_accumulation_steps = 1
gradient_clipping = 1.0
steps_per_print = 100
warmup_steps = 100
activation_checkpointing = true

# Eval disabled for run 1 (no eval set). Preview epoch checkpoints in ComfyUI instead.
eval_before_first_step = false
eval_every_n_epochs = 100000

save_every_n_epochs = 1
checkpoint_every_n_minutes = 999999
save_dtype = 'bfloat16'

[model]
type = 'anima'
transformer_path = '/workspace/anima/models/anima-base-v1.0.safetensors'
vae_path = '/workspace/anima/models/qwen_image_vae.safetensors'
qwen_path = '/workspace/anima/models/Qwen3-0.6B-Base'
dtype = 'bfloat16'
llm_adapter_lr = 0
cache_text_embeddings = false
shuffle_tags = false
tag_delimiter = ', '
shuffle_keep_first_n = 1
tag_dropout_percent = 0
caption_dropout_percent = 0.1
caption_mode = 'tags'
timestep_sample_method = 'logit_normal'

# NOTE: no [adapter] block => full finetune (not LoRA).

[optimizer]
type = 'adamw_optimi'
lr = 8e-06
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8

[monitoring]
enable_wandb = false
