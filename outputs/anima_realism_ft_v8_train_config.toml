# diffusion-pipe — Anima FULL finetune. v8 = FIDELITY REFINER.
# WARM-START from the V7 keeper (V7_epoch17.safetensors): keeps ep17's realism + specific concepts,
# trains on a small ALL-CLEAN set (detail close-ups + candid anchor + bg) to erase the learned
# compression look and sharpen fingers/clothes/phones/toes/bg, WHILE keeping the amateur aesthetic.
# lr 4e-6 (LOWER than v7's validated 8e-6 -> refine without disturbing learned concepts).
# epochs 10 = ceiling; save-every -> pick best on the frozen eval set (loss is blind here).
# Spec: docs/superpowers/specs/2026-06-04-anima-realism-v8-fidelity-refiner-design.md
output_dir = '/workspace/anima/outputs/anima_realism_ft_v8'
dataset = '/workspace/anima/outputs/anima_realism_ft_v8_dataset_config.toml'

epochs = 10
micro_batch_size_per_gpu = 1
pipeline_stages = 1
gradient_accumulation_steps = 1
gradient_clipping = 1.0
steps_per_print = 100
warmup_steps = 100
activation_checkpointing = true

# Eval disabled (no eval set in-trainer). Preview epoch checkpoints in ComfyUI with the frozen eval prompts.
eval_before_first_step = false
eval_every_n_epochs = 100000

save_every_n_epochs = 1
checkpoint_every_n_minutes = 999999
save_dtype = 'bfloat16'

[model]
type = 'anima'
# WARM-START: upload the V7 keeper here as anima_v7_epoch17.safetensors (NOT the base DiT, NOT the v6 keeper).
transformer_path = '/workspace/anima/models/anima_v7_epoch17.safetensors'
vae_path = '/workspace/anima/models/qwen_image_vae.safetensors'
qwen_path = '/workspace/anima/models/Qwen3-0.6B-Base'
dtype = 'bfloat16'
llm_adapter_lr = 0
cache_text_embeddings = false
shuffle_tags = false          # captions carry one NL sentence -> shuffling commas would shred it
tag_delimiter = ', '
shuffle_keep_first_n = 1
tag_dropout_percent = 0
caption_dropout_percent = 0.1
caption_mode = 'tags'
timestep_sample_method = 'logit_normal'
# ⚠️ 1536 VRAM: same as v7 (ran fine on the 96GB Blackwell). If OOM on a smaller card:
#    (1) uncomment qwen_nf4 below, and/or (2) switch [optimizer] to adamw8bit (needs bitsandbytes).
# qwen_nf4 = true

# NOTE: no [adapter] block => full finetune (not LoRA). Full-FT erases compression by moving base weights.

[optimizer]
type = 'adamw_optimi'         # same as v7; switch to adamw8bit only if 1536 OOMs the card
lr = 4e-06                    # REFINER: lower than v7's validated 8e-6 -> sharpen, don't drift. Tune from eval.
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8

[monitoring]
enable_wandb = false
